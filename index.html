<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowmya & Venu Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:15px;
  text-align:center;
}

/* TITLE */
h1{
  font-family:'Great Vibes',cursive;
  font-size:2.5rem;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:8px;
  font-size:14px;
}

/* CARD */
.card{
  margin-top:15px;
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:12px;
}

/* MAIN IMAGE */
.photo-box img{
  width:100%;
  border-radius:15px;
  margin-top:20px;
}

/* GALLERY */
.gallery{
  margin-top:30px;
}

.gallery h2{
  font-family:'Great Vibes',cursive;
  margin-bottom:15px;
}

/* ROW STYLES */
.row{
  margin-bottom:10px;
  display:grid;
  gap:8px;
}

.row img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* 1 IMAGE */
.row-1{
  grid-template-columns:1fr;
}

/* 2 IMAGES */
.row-2{
  grid-template-columns:1fr 1fr;
}

/* 3 IMAGES */
.row-3{
  grid-template-columns:1fr 1fr 1fr;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  max-width:95%;
  max-height:90%;
  border-radius:10px;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#fff;
  color:#000;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="music" onclick="startMusic()">🔊 Tap</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle">
💍 With joyful hearts, we invite you 💍
</div>

<div class="card">
With blessings of our families, we invite you to celebrate our engagement.
</div>

<div class="card">
📍 Thotapally <br>
🗓 April 15, 2026 • 11:00 AM
</div>

<!-- MAIN IMAGE -->
<div class="photo-box">
  <img src="photo1.jpg" onclick="openImage('photo1.jpg')">
</div>

<!-- GALLERY -->
<div class="gallery">
<h2>Our Moments ✨</h2>

<!-- 1 IMAGE -->
<div class="row row-1">
  <img src="g1.jpg" onclick="openImage('g1.jpg')">
</div>

<!-- 2 IMAGES -->
<div class="row row-2">
  <img src="g2.jpg" onclick="openImage('g2.jpg')">
  <img src="g3.jpg" onclick="openImage('g3.jpg')">
</div>

<!-- 3 IMAGES -->
<div class="row row-3">
  <img src="g4.jpg" onclick="openImage('g4.jpg')">
  <img src="g5.jpg" onclick="openImage('g5.jpg')">
  <img src="g6.jpg" onclick="openImage('g6.jpg')">
</div>

<!-- REPEAT PATTERN AGAIN -->
<div class="row row-1">
  <img src="g7.jpg" onclick="openImage('g7.jpg')">
</div>

<div class="row row-2">
  <img src="g8.jpg" onclick="openImage('g8.jpg')">
  <img src="g9.jpg" onclick="openImage('g9.jpg')">
</div>

</div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
  <img id="popup-img">
</div>

<script>

// MUSIC
let started=false;
function startMusic(){
  if(started) return;
  started=true;
  document.getElementById("bgm").play();
}
document.addEventListener("click", startMusic, { once:true });

// IMAGE VIEW
function openImage(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-img").src=src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
