<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sowmya & Venu Engagement</title>

<!-- WhatsApp Preview -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://venuvaragala.github.io/invitation/">
<meta property="og:title" content="Sowmya & Venu Engagement">
<meta property="og:description" content="April 15, 2026 • 11:00 AM • Thotapally">
<meta property="og:image" content="https://venuvaragala.github.io/preview.jpg">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:10px;
  opacity:.8;
}

.countdown{
  margin-top:15px;
  font-size:1.2rem;
}

/* CARD */
.card{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
}

/* BUTTON */
.map-btn{
  margin-top:10px;
  display:inline-block;
  padding:10px 15px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff,#ffd86f);
  color:#000;
  text-decoration:none;
}

/* CENTER PHOTO */
.couple-photo{
  margin-top:25px;
  display:flex;
  justify-content:center;
}

.couple-photo img{
  width:350px;
  max-width:95%;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  border:2px solid rgba(255,255,255,0.3);
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="playMusic()">🔊 Music</div>

<div class="container">

<h1>Sowmya & Venu</h1>
<div class="subtitle">April 15, 2026 • 11:00 AM</div>

<div class="countdown" id="countdown"></div>

<div class="card">
  <p><strong>Venue:</strong> Thotapally</p>
  <a class="map-btn" href="https://maps.app.goo.gl/2smbzygt1yn5xWY19" target="_blank">
    📍 Open Location
  </a>
</div>

<!-- ✅ ONLY ONE PHOTO (CENTERED) -->
<div class="couple-photo">
  <img src="photo1.jpg" alt="Couple Photo">
</div>

</div>

<script>
function playMusic(){
  const music=document.getElementById('bgm');
  music.volume=0;
  music.play();
  let vol=0;
  const interval=setInterval(()=>{
    vol+=0.05;
    music.volume=Math.min(vol,1);
    if(vol>=1) clearInterval(interval);
  },200);
}

// COUNTDOWN
const eventDate=new Date("April 15, 2026 11:00:00").getTime();
setInterval(()=>{
  const now=new Date().getTime();
  const gap=eventDate-now;

  const d=Math.floor(gap/(1000*60*60*24));
  const h=Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  const m=Math.floor((gap%(1000*60*60))/(1000*60));
  const s=Math.floor((gap%(1000*60))/1000);

  document.getElementById('countdown').innerText =
    `${d}d ${h}h ${m}m ${s}s left`;
},1000);

// SPARKLES
for(let i=0;i<30;i++){
  const s=document.createElement('div');
  s.className='sparkle';
  s.style.left=Math.random()*100+'vw';
  s.style.animationDuration=(Math.random()*3+2)+'s';
  document.body.appendChild(s);
}
</script>

</body>
</html>
