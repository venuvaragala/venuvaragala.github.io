<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowmya & Venu Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTAINER */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:15px;
}

/* TITLE */
h1{
  font-family:'Great Vibes',cursive;
  font-size:clamp(2rem, 6vw, 3.5rem);
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:8px;
  font-size:clamp(14px,3vw,18px);
}

/* CARD */
.card{
  margin-top:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:15px;
  border-radius:12px;
  width:100%;
  max-width:500px;
  font-size:clamp(13px,3vw,16px);
}

/* IMAGE */
.photo-box img{
  width:100%;
  max-width:500px;
  margin-top:20px;
  border-radius:15px;
}

/* BUTTON */
.view-btn{
  margin-top:10px;
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  color:#000;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}

/* GALLERY */
.gallery{
  margin-top:30px;
  width:100%;
}

.gallery h2{
  font-family:'Great Vibes',cursive;
  font-size:clamp(1.8rem,5vw,2.5rem);
  margin-bottom:15px;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:8px;
}

.gallery-item img{
  width:100%;
  height:110px;
  object-fit:cover;
  border-radius:10px;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  max-width:95%;
  max-height:90%;
  border-radius:10px;
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#fff;
  color:#000;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

/* MOBILE TWEAKS */
@media(max-width:480px){

  .container{
    padding:10px;
  }

  .card{
    padding:12px;
  }

  .gallery-item img{
    height:90px;
  }
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="music" onclick="startMusic()">🔊 Tap</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle">
💍 With joyful hearts, we invite you 💍
</div>

<div class="card">
With blessings of our families, we invite you to celebrate our engagement.
</div>

<div class="card">
📍 Thotapally <br>
🗓 April 15, 2026 • 11:00 AM
</div>

<!-- MAIN IMAGE -->
<div class="photo-box">
  <img src="photo1.jpg">
  <button class="view-btn" onclick="openImage('photo1.jpg')">View</button>
</div>

<!-- GALLERY -->
<div class="gallery">
  <h2>Our Moments ✨</h2>

  <div class="gallery-grid">

    <div class="gallery-item">
      <img src="g1.jpg" onclick="openImage('g1.jpg')">
    </div>

    <div class="gallery-item">
      <img src="g2.jpg" onclick="openImage('g2.jpg')">
    </div>

    <div class="gallery-item">
      <img src="g3.jpg" onclick="openImage('g3.jpg')">
    </div>

    <div class="gallery-item">
      <img src="g4.jpg" onclick="openImage('g4.jpg')">
    </div>

    <div class="gallery-item">
      <img src="g5.jpg" onclick="openImage('g5.jpg')">
    </div>

    <div class="gallery-item">
      <img src="g6.jpg" onclick="openImage('g6.jpg')">
    </div>

  </div>
</div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
  <img id="popup-img">
</div>

<script>

// MUSIC
let started=false;
function startMusic(){
  if(started) return;
  started=true;
  document.getElementById("bgm").play();
}
document.addEventListener("click", startMusic, { once:true });

// IMAGE VIEW
function openImage(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-img").src=src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
