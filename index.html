<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowmya & Venu Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BLOCK IMAGE DRAG */
img{
  -webkit-user-drag:none;
  pointer-events:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* TITLE */
h1{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:10px;
  opacity:.9;
}

/* CARD */
.card{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:600px;
}

/* PHOTO WRAPPER */
.photo-box{
  position:relative;
  display:inline-block;
}

/* IMAGE STYLE */
.photo-box img{
  width:550px;
  max-width:95%;
  margin-top:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* GALLERY GRID */
.gallery{
  margin-top:40px;
}

.gallery h2{
  font-family:'Great Vibes',cursive;
  font-size:2.5rem;
  margin-bottom:15px;
}

.gallery-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
  gap:10px;
  max-width:800px;
}

.gallery-item{
  position:relative;
}

.gallery-item img{
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:10px;
}

/* VIEW BUTTON */
.view-btn{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  padding:6px 12px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  color:#000;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  pointer-events:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  max-width:90%;
  max-height:90%;
  border-radius:15px;
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body oncontextmenu="return false">

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="music" onclick="startMusic()">🔊 Tap</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle">
💍 With joyful hearts, we invite you 💍
</div>

<div class="card">
  With blessings of our families, we invite you to celebrate our engagement.
</div>

<div class="card">
  📍 Thotapally <br>
  🗓 April 15, 2026 • 11:00 AM
</div>

<!-- MAIN IMAGE -->
<div class="photo-box">
  <img src="photo1.jpg">
  <button class="view-btn" onclick="openImage('photo1.jpg')">View</button>
</div>

<!-- GALLERY -->
<div class="gallery">
  <h2>Our Moments ✨</h2>
  <div class="gallery-grid">

    <div class="gallery-item">
      <img src="g1.jpg">
      <button class="view-btn" onclick="openImage('g1.jpg')">View</button>
    </div>

    <div class="gallery-item">
      <img src="g2.jpg">
      <button class="view-btn" onclick="openImage('g2.jpg')">View</button>
    </div>

    <div class="gallery-item">
      <img src="g3.jpg">
      <button class="view-btn" onclick="openImage('g3.jpg')">View</button>
    </div>

    <div class="gallery-item">
      <img src="g4.jpg">
      <button class="view-btn" onclick="openImage('g4.jpg')">View</button>
    </div>

    <div class="gallery-item">
      <img src="g5.jpg">
      <button class="view-btn" onclick="openImage('g5.jpg')">View</button>
    </div>

    <div class="gallery-item">
      <img src="g6.jpg">
      <button class="view-btn" onclick="openImage('g6.jpg')">View</button>
    </div>

  </div>
</div>

</div>

<!-- POPUP -->
<div id="popup">
  <img id="popup-img">
</div>

<script>

// 🔒 PROTECTION
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

document.addEventListener("keydown", e=>{
  if(e.ctrlKey && ["u","s","c","v"].includes(e.key.toLowerCase())){
    e.preventDefault();
  }
  if(e.key === "F12") e.preventDefault();
});

// 🎵 MUSIC
let started=false;
function startMusic(){
  if(started) return;
  started=true;
  document.getElementById("bgm").play();
}
document.addEventListener("click", startMusic, { once:true });

// 🖼 IMAGE VIEW
function openImage(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-img").src=src;
}

document.getElementById("popup").onclick=()=>{
  document.getElementById("popup").style.display="none";
};

// ✨ SPARKLES
for(let i=0;i<30;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(s);
}

</script>

</body>
</html>
