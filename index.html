<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sowmya & Venu Engagement</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    body{
      font-family:'Poppins',sans-serif;
      background:#000;
      color:#fff;
      overflow-x:hidden;
    }

    /* HERO VIDEO BACKGROUND */
    header{
      position:relative;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    header video{
      position:absolute;
      top:0;left:0;
      width:100%;
      height:100%;
      object-fit:cover;
      z-index:-2;
    }

    header::after{
      content:"";
      position:absolute;
      width:100%;height:100%;
      background:rgba(0,0,0,0.6);
      z-index:-1;
    }

    .hero-content{
      z-index:2;
    }

    h1{
      font-family:'Playfair Display',serif;
      font-size:2.8rem;
      letter-spacing:2px;
    }

    /* NAME REVEAL */
    .names span{
      display:block;
      opacity:0;
      transform:translateY(40px);
      animation:reveal 1.5s forwards;
    }

    .names span:nth-child(1){animation-delay:0.5s}
    .names span:nth-child(2){animation-delay:2s}

    @keyframes reveal{
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .typing{
      margin-top:15px;
      font-size:1.2rem;
      border-right:2px solid #fff;
      white-space:nowrap;
      overflow:hidden;
      width:0;
      animation:typing 4s steps(30,end) forwards, blink .7s infinite;
    }

    @keyframes typing{
      from{width:0}
      to{width:100%}
    }

    @keyframes blink{
      50%{border-color:transparent}
    }

    section{
      padding:50px 15px;
      text-align:center;
    }

    .details p{
      margin:8px 0;
      font-size:1rem;
      color:#ccc;
    }

    /* GALLERY */
    .gallery{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
      padding:10px;
    }

    .gallery img{
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:10px;
      transition:transform .4s;
    }

    .gallery img:hover{
      transform:scale(1.05);
    }

    /* TABLET */
    @media(min-width:768px){
      .gallery{
        grid-template-columns:repeat(2,1fr);
      }
      h1{font-size:3.5rem}
    }

    /* DESKTOP */
    @media(min-width:1024px){
      .gallery{
        grid-template-columns:repeat(3,1fr);
      }
    }

    /* FADE SCROLL */
    .fade{
      opacity:0;
      transform:translateY(40px);
      transition:1s;
    }

    .fade.show{
      opacity:1;
      transform:translateY(0);
    }

    footer{
      background:#111;
      padding:15px;
      font-size:0.8rem;
    }

  </style>
</head>
<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8c36.mp3?filename=romantic-piano-110997.mp3" type="audio/mpeg">
</audio>

<header>
  <!-- VIDEO BACKGROUND -->
  <video autoplay muted loop playsinline>
    <source src="https://cdn.coverr.co/videos/coverr-a-happy-couple-in-love-5172/1080p.mp4" type="video/mp4">
  </video>

  <div class="hero-content">
    <h1 class="names">
      <span>Sowmya</span>
      <span>& Venu</span>
    </h1>
    <div class="typing">April 15, 2026 • 11:00 AM • Thotapally</div>
  </div>
</header>

<section class="details fade">
  <h2>Engagement Details</h2>
  <p>Date: April 15, 2026</p>
  <p>Time: 11:00 AM</p>
  <p>Venue: Thotapally</p>
</section>

<section class="fade">
  <h2>4K Cinematic Gallery</h2>
  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1529634890462-4c2c1f7a1a74?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1532712938310-34cb3982ef74?auto=format&fit=crop&w=3840&q=100">
  </div>
</section>

<footer>
  <p>Forever begins here ❤️</p>
</footer>

<script>
  const fadeEls = document.querySelectorAll('.fade');
  window.addEventListener('scroll', () => {
    fadeEls.forEach(el => {
      if(el.getBoundingClientRect().top < window.innerHeight - 50){
        el.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
