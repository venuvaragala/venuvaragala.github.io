<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;

  /* 🚫 Disable text selection */
  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;
}

/* 🚫 Disable image drag */
img{
  -webkit-user-drag:none;
  pointer-events:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTAINER */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

/* TITLE */
h1{
  font-family:'Cinzel',serif;
  font-size:3.3rem;
  letter-spacing:3px;
  text-transform:uppercase;

  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;

  text-shadow:0 5px 25px rgba(0,0,0,0.4);
}

.subtitle{
  margin-top:10px;
  opacity:.9;
}

/* CARD */
.card{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:600px;
}

/* BUTTON */
.map-btn{
  margin-top:10px;
  display:inline-block;
  padding:10px 15px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff,#ffd86f);
  color:#000;
  text-decoration:none;
  font-weight:600;
}

/* PHOTO */
.couple-photo img{
  width:550px;
  max-width:95%;
  margin-top:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
  opacity:0.7;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body oncontextmenu="return false">

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- AUDIO -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle" id="countdownText">
💍 With joyful hearts, we invite you to our engagement 💍
</div>

<!-- INVITATION -->
<div class="card">
  <p style="line-height:1.6;">
    With blessings of our families and divine grace,  
    we invite you to celebrate our engagement ceremony.  
    Your presence will make our moment complete.
  </p>
</div>

<!-- DETAILS -->
<div class="card">
  <p><strong>📍 Venue:</strong> Thotapally</p>
  <p><strong>🗓 Date:</strong> April 15, 2026 • 11:00 AM</p>

  <a class="map-btn" href="https://maps.app.goo.gl/2smbzygt1yn5xWY19" target="_blank">
    📍 Open Location
  </a>
</div>

<!-- PHOTO -->
<div class="couple-photo">
  <img src="photo1.jpg" alt="Couple">
</div>

</div>

<script>

/* 🎧 AUDIO AUTO SYSTEM (BEST POSSIBLE) */
let audioStarted = false;
const music = document.getElementById("bgm");

function startAudio() {
  if (audioStarted) return;
  audioStarted = true;

  music.volume = 0;

  const playAudio = () => {
    const p = music.play();

    if (p !== undefined) {
      p.then(() => {
        let v = 0;
        const fade = setInterval(() => {
          v += 0.05;
          music.volume = Math.min(v, 1);
          if (v >= 1) clearInterval(fade);
        }, 150);
      }).catch(() => {
        console.log("Autoplay blocked by browser policy");
      });
    }
  };

  playAudio();
}

/* BEST POSSIBLE TRIGGER SYSTEM */
document.addEventListener("click", startAudio, { once: true });
document.addEventListener("touchstart", startAudio, { once: true });
  
/* ⏳ COUNTDOWN */
const eventDate = new Date("April 15, 2026 11:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const gap = eventDate - now;

  const d = Math.floor(gap/(1000*60*60*24));
  const h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((gap%(1000*60*60))/(1000*60));
  const s = Math.floor((gap%(1000*60))/1000);

  document.getElementById("countdownText").innerText =
    `💍 ${d}d ${h}h ${m}m ${s}s left for the big moment 💍`;

},1000);

/* ✨ SPARKLES */
for(let i=0;i<35;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(s);
}

</script>

</body>
