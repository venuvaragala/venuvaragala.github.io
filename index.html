<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowmya & Venu Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
}

/* LOCK SCREEN */
#lock-screen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.lock-box input, .lock-box button{
  padding:10px;
  margin-top:10px;
}

/* VIDEO BG */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:3rem;
  margin-top:60px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

/* SLIDESHOW */
.slideshow{
  width:90%;
  max-width:600px;
  height:300px;
  position:relative;
  overflow:hidden;
  border-radius:20px;
  margin-top:20px;
}

.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  opacity:0;
  transition:1s;
}

.slide.active{
  opacity:1;
}

/* SWIPE GALLERY */
.swipe-gallery{
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-top:20px;
}

.swipe-gallery img{
  width:250px;
  height:180px;
  object-fit:cover;
  border-radius:10px;
}

/* VIDEO */
.video-section video{
  width:90%;
  max-width:500px;
  margin:10px 0;
  border-radius:15px;
}

/* MUSIC BTN */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:10px;
  border-radius:20px;
  cursor:pointer;
}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body oncontextmenu="return false">

<!-- LOCK -->
<div id="lock-screen">
  <div class="lock-box">
    <h2>Private Invitation 🔐</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="unlock()">Enter</button>
  </div>
</div>

<!-- BG -->
<video autoplay muted loop>
  <source src="your-video.mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3">
</audio>
<div class="music" onclick="startMusic()">🔊</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<!-- SLIDESHOW -->
<div class="slideshow">
  <img src="g1.jpg" class="slide active">
  <img src="g2.jpg" class="slide">
  <img src="g3.jpg" class="slide">
</div>

<!-- SWIPE GALLERY -->
<div class="swipe-gallery">
  <img src="g1.jpg">
  <img src="g2.jpg">
  <img src="g3.jpg">
  <img src="g4.jpg">
</div>

<!-- VIDEO -->
<div class="video-section">
  <h2>Our Video Moments 🎬</h2>
  <video controls>
    <source src="v1.mp4">
  </video>
  <video controls>
    <source src="v2.mp4">
  </video>
</div>

</div>

<script>

// PASSWORD
function unlock(){
  if(document.getElementById("pass").value === "SowmyaVenu@2026"){
    document.getElementById("lock-screen").style.display="none";
  }else{
    alert("Wrong password");
  }
}

// BLOCK ACTIONS
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("keydown", e=>{
  if(e.ctrlKey) e.preventDefault();
  if(e.key === "F12") e.preventDefault();
});

// MUSIC
let started=false;
function startMusic(){
  if(started) return;
  started=true;
  document.getElementById("bgm").play();
}

// SLIDESHOW
let slides=document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
  slides[i].classList.remove("active");
  i=(i+1)%slides.length;
  slides[i].classList.add("active");
},3000);

// SPARKLES
for(let i=0;i<30;i++){
  let s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(s);
}

</script>

</body>
</html>
