<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Engagement Moments</title>

  <!-- WhatsApp Preview (Open Graph) -->
<meta property="og:title" content="Sowmya & Venu Engagement 💍">
<meta property="og:description" content="With joyful hearts, we invite you to our special day on April 15, 2026 at Thotapally.">
<meta property="og:image" content="https://yourdomain.com/preview.jpg">
<meta property="og:url" content="https://yourdomain.com">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">


<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-user-select:none;
  user-select:none;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
}

/* BLOCK IMAGE DRAG */
img{
  pointer-events:none;
  -webkit-user-drag:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

/* CONTAINER */
.container{
  padding:15px;
  text-align:center;
}

/* TITLE */
h1{
  font-family:'Great Vibes',cursive;
  font-size:2.5rem;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:8px;
  font-size:14px;
}

/* CARD */
.card{
  margin-top:15px;
  background:rgba(255,255,255,0.1);
  padding:12px;
  border-radius:12px;
}

/* PHOTO BLOCK */
.photo{
  position:relative;
  margin-top:20px;
}

.photo img{
  width:100%;
  border-radius:15px;
}

/* VIEW BUTTON */
.view-btn{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  color:#000;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  pointer-events:auto;
}

/* POPUP */
#popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#popup img{
  max-width:95%;
  max-height:90%;
  border-radius:10px;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:15px;
  right:15px;
  background:#fff;
  color:#000;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

</style>
</head>

<body oncontextmenu="return false">

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<!-- MUSIC -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="music" onclick="startMusic()">🔊 Tap</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle">
💍 With joyful hearts, we invite you 💍
</div>

<div class="card">
Thank you for being part of our special day.
</div>

<div class="card">
📍 Thotapally <br>
🗓 April 15, 2026 • 11:00 AM
</div>

<!-- ALL PHOTOS BIG -->

<div class="photo">
  <img src="g1.jpg">
  <button class="view-btn" onclick="openImage('g1.jpg')">View</button>
</div>

<div class="photo">
  <img src="g2.jpg">
  <button class="view-btn" onclick="openImage('g2.jpg')">View</button>
</div>

<div class="photo">
  <img src="g3.jpg">
  <button class="view-btn" onclick="openImage('g3.jpg')">View</button>
</div>

<div class="photo">
  <img src="g4.jpg">
  <button class="view-btn" onclick="openImage('g4.jpg')">View</button>
</div>

<div class="photo">
  <img src="g5.jpg">
  <button class="view-btn" onclick="openImage('g5.jpg')">View</button>
</div>

<div class="photo">
  <img src="g6.jpg">
  <button class="view-btn" onclick="openImage('g6.jpg')">View</button>
</div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
  <img id="popup-img">
</div>

<script>

// 🔒 BASIC PROTECTION
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

document.addEventListener("keydown", e=>{
  if(e.ctrlKey && ["u","s","c","v"].includes(e.key.toLowerCase())){
    e.preventDefault();
  }
  if(e.key === "F12") e.preventDefault();
});

// 🎵 MUSIC
let started=false;
function startMusic(){
  if(started) return;
  started=true;
  document.getElementById("bgm").play();
}
document.addEventListener("click", startMusic, { once:true });

// 🖼 VIEW IMAGE
function openImage(src){
  document.getElementById("popup").style.display="flex";
  document.getElementById("popup-img").src=src;
}

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
