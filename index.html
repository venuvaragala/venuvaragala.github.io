<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sowmya & Venu Engagement</title>

<meta property="og:type" content="website">
<meta property="og:url" content="https://venuvaragala.github.io/invitation/">
<meta property="og:title" content="Sowmya & Venu Engagement">
<meta property="og:description" content="April 15, 2026 • 11:00 AM • Thotapally">
<meta property="og:image" content="https://venuvaragala.github.io/preview.jpg">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
  -webkit-user-select:none;
  -ms-user-select:none;
}

body{
  font-family:'Montserrat',sans-serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* BLOCK IMAGE DRAG */
img{
  pointer-events:none;
  -webkit-user-drag:none;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  margin-top:10px;
  opacity:.9;
}

.card{
  margin-top:20px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
  max-width:600px;
}

.map-btn{
  margin-top:10px;
  display:inline-block;
  padding:10px 15px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff,#ffd86f);
  color:#000;
  text-decoration:none;
  font-weight:600;
}

.couple-photo img{
  width:550px;
  max-width:95%;
  margin-top:20px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.music{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#fff;
  color:#000;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;
  font-weight:600;
  z-index:10;
}

/* SPARKLES */
.sparkle{
  position:fixed;
  width:5px;
  height:5px;
  background:white;
  border-radius:50%;
  animation:fall linear infinite;
  opacity:0.7;
}

@keyframes fall{
  from{transform:translateY(-10vh)}
  to{transform:translateY(110vh)}
}
</style>
</head>

<body oncontextmenu="return false">

<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="startMusic()">🔊 Tap to Play</div>

<div class="container">

<h1>Sowmya & Venu</h1>

<div class="subtitle">
💍 With joyful hearts, we invite you 💍
</div>

<div class="card">
  <p style="line-height:1.6;">
    With blessings of our families and divine grace,  
    we invite you to celebrate our engagement ceremony.
  </p>
</div>

<div class="card">
  <p><strong>📍 Venue:</strong> Thotapally</p>
  <p><strong>🗓 Date:</strong> April 15, 2026 • 11:00 AM</p>

  <a class="map-btn" href="https://maps.app.goo.gl/2smbzygt1yn5xWY19" target="_blank">
    📍 Open Location
  </a>
</div>

<div class="couple-photo">
  <img src="photo1.jpg" alt="Couple">
</div>

</div>

<script>

// BLOCK COPY EVENTS (CORE SECURITY LAYER)
document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("cut", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());

// BLOCK KEYBOARD SHORTCUTS
document.addEventListener("keydown", function(e){
  if(
    e.ctrlKey && 
    ["u","s","c","v"].includes(e.key.toLowerCase())
  ){
    e.preventDefault();
  }

  if(e.key === "F12"){
    e.preventDefault();
  }
});

// MUSIC
let started = false;

function startMusic(){
  if(started) return;
  started = true;

  const music = document.getElementById("bgm");
  music.volume = 0;

  const playPromise = music.play();

  if(playPromise){
    playPromise.then(()=>{
      let v = 0;
      const fade = setInterval(()=>{
        v += 0.05;
        music.volume = Math.min(v,1);
        if(v >= 1) clearInterval(fade);
      },200);
    }).catch(()=>{});
  }
}

document.addEventListener("click", startMusic, { once:true });

// COUNTDOWN
const eventDate = new Date("April 15, 2026 11:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const gap = eventDate - now;

  const d = Math.floor(gap/(1000*60*60*24));
  const h = Math.floor((gap%(1000*60*60*24))/(1000*60*60));
  const m = Math.floor((gap%(1000*60*60))/(1000*60));
  const s = Math.floor((gap%(1000*60))/1000);

  document.querySelector(".subtitle").innerText =
    `💍 ${d}d ${h}h ${m}m ${s}s left for the big moment 💍`;

},1000);

// SPARKLES
for(let i=0;i<35;i++){
  const s=document.createElement("div");
  s.className="sparkle";
  s.style.left=Math.random()*100+"vw";
  s.style.animationDuration=(Math.random()*3+2)+"s";
  document.body.appendChild(s);
}

</script>

</body>
</html>
