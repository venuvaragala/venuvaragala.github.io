<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sowmya & Venu Engagement</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Montserrat',sans-serif;
  background:#0f0f1a;
  color:#fff;
}

/* VIDEO BACKGROUND */
video{
  position:fixed;
  width:100%;height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:fixed;
  width:100%;height:100%;
  background:linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,50,0.7));
  z-index:-1;
}

/* CENTER CONTENT */
.container{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

h1{
  font-family:'Great Vibes',cursive;
  font-size:3.5rem;
  font-weight:400;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  -webkit-background-clip:text;
  color:transparent;
  letter-spacing:2px;
  animation:fadeIn 2s ease;
}

.subtitle{
  margin-top:10px;
  font-size:1.2rem;
  opacity:0.8;
  animation:fadeIn 3s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}

/* GLASS CARD */
.card{
  margin-top:30px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.08);
  border-radius:20px;
  padding:25px;
  width:90%;
  max-width:400px;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}

.card p{
  margin:8px 0;
  font-size:1rem;
}

/* COLORFUL GLASS BUTTON */
.map-btn{
  margin-top:15px;
  padding:12px 18px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff,#ffd86f);
  color:#000;
  font-weight:600;
  text-decoration:none;
  display:inline-block;
  transition:0.3s;
}

.map-btn:hover{
  transform:scale(1.08);
}

/* GALLERY */
.gallery{
  margin-top:30px;
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.gallery img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:15px;
}

@media(min-width:768px){
  .gallery{grid-template-columns:repeat(2,1fr)}
}

@media(min-width:1024px){
  .gallery{grid-template-columns:repeat(3,1fr)}
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:10px 15px;
  border-radius:30px;
  background:linear-gradient(45deg,#ff7eb3,#65d6ff);
  color:#000;
  cursor:pointer;
}

</style>
</head>
<body>

<video autoplay muted loop playsinline>
  <source src="your-video.mp4" type="video/mp4">
</video>
<div class="overlay"></div>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b8c36.mp3" type="audio/mpeg">
</audio>

<div class="music" onclick="playMusic()">🔊 Music</div>

<div class="container">

  <h1>Sowmya & Venu</h1>
  <div class="subtitle">April 15, 2026 • 11:00 AM</div>

  <div class="card">
    <p><strong>Venue:</strong> Thotapally</p>
    <a class="map-btn" href="https://www.google.com/maps/search/?api=1&query=Thotapally" target="_blank">
      📍 Open Location
    </a>
  </div>

  <div class="gallery">
    <img src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?auto=format&fit=crop&w=3840&q=100">
    <img src="https://images.unsplash.com/photo-1511285560929-80b456fea0bc?auto=format&fit=crop&w=3840&q=100">
  </div>

</div>

<script>
function playMusic(){
  document.getElementById('bgm').play();
}
</script>

</body>
</html>
